name: aisle_vision
services:
    aisle-vision-bff:
        build:
            context: ..
            dockerfile: Dockerfile
        image: aisle_vision_api:latest
        container_name: aisle_vision_api_prod
        ports:
            - "80:3000"
        depends_on:
            - aisle-vision-db
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://aislevision:Dejavu1985@5432/avdb_prod
        command: node dist/main

    aisle-vision-db:
        image: postgres:16
        container_name: aisle_vision_db_prod
        restart: always
        ports:
            - "5434:5432"
        environment:
            POSTGRES_USER: aislevision
            POSTGRES_PASSWORD: Dejavu1985
            POSTGRES_DB: avdb_prod
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata:
